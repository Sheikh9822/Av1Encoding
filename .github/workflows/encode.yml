name: AV1 Universal Pipeline
run-name: "🚀 [MISSION]: ${{ inputs.ui_title || inputs.custom_name || 'Target' }}"

on:
  workflow_dispatch:
    inputs:
      ui_title:
        description: 'Dashboard Title'
      video_url:
        description: 'Link (TG, M3U8, or Direct CDN)'
        required: true
      custom_name:
        description: 'Output Filename'
      res_choice:
        description: 'Resolution'
      custom_crf:
        description: 'CRF'
        default: '55'
      custom_preset:
        description: 'Preset'
        default: '6'
      film_grain:
        description: 'Grain'
        default: '0'
      audio_mode:
        description: 'Audio Mode'
        default: 'opus'
      audio_bitrate:
        description: 'Audio Bitrate'
        default: '64k'
      run_vmaf:
        description: 'Run VMAF?'
        default: 'true'
      anime_name:
        description: 'Anime Name (leave blank to skip rename)'
        default: ''
      season:
        description: 'Season Number'
        default: '1'
      episode:
        description: 'Episode Number'
        default: '1'
      audio_type:
        description: 'Audio Type Override (Auto/Sub/Dual/Tri/Multi)'
        default: 'Auto'
      content_type:
        description: 'Content Type (Anime/Donghua/Hentai/HMV/AMV/custom)'
        default: 'Anime'
      sub_tracks:
        description: 'Subtitle Track Labels'
        default: ''
      audio_tracks:
        description: 'Audio Track Labels'
        default: ''

permissions:
  actions: write
  contents: read

jobs:
  # PHASE 1: SMART DOWNLOADER
  download_phase:
    runs-on: ubuntu-latest
    # No job-level concurrency — parallel runs are fine.
    # FloodWait is handled by retry logic in tg_handler.py.
    # Session cache lanes (A/B/C) are resolved per-run at step level.
    outputs:
      final_name: ${{ steps.get_name.outputs.NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 🛠 Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y aria2
          pip install pyrogram tgcrypto yt-dlp

      - name: 📁 Setup Session Dir
        run: mkdir -p tg_session_dir

      - name: 🔀 Resolve Lane
        id: lane
        run: |
          LAST=$(( ${{ github.run_number }} % 10 ))
          if [[ "$LAST" == "0" || "$LAST" == "3" || "$LAST" == "6" || "$LAST" == "9" ]]; then
            echo "name=lane-A" >> $GITHUB_OUTPUT
          elif [[ "$LAST" == "1" || "$LAST" == "4" || "$LAST" == "7" ]]; then
            echo "name=lane-B" >> $GITHUB_OUTPUT
          else
            echo "name=lane-C" >> $GITHUB_OUTPUT
          fi
          echo "Lane: $(cat $GITHUB_OUTPUT | grep name | cut -d= -f2)"

      - name: 💾 Restore Session Cache
        uses: actions/cache@v4
        with:
          path: tg_session_dir
          key: tg-session-${{ steps.lane.outputs.name }}
          restore-keys: tg-session-

      - name: 📥 Universal Download
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_KV_TOKEN: ${{ secrets.CF_KV_TOKEN }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          CUSTOM: ${{ github.event.inputs.custom_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          URL="${{ github.event.inputs.video_url }}"
          
          # Telegram Logic
          if [[ "$URL" == tg_file:* ]] || [[ "$URL" == https://t.me/* ]]; then
            python3 tg_handler.py
          # Magnet Safety
          elif [[ "$URL" == magnet:* ]]; then
            echo "❌ ERROR: Magnet links are disabled." && exit 1
          # Direct/CDN Logic (Uses aria2c directly to prevent yt-dlp timeouts)
          else
            if [ -z "$CUSTOM" ]; then
                if [[ "$URL" == *.m3u8* ]] || [[ "$URL" == *m3u8* ]]; then
                    CLEAN_NAME=$(dirname "$URL" | xargs basename | sed 's/\?.*//' | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))")
                else
                    CLEAN_NAME=$(basename "$URL" | sed 's/\?.*//' | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))")
                fi
                if [[ "$CLEAN_NAME" != *.mkv ]] && [[ "$CLEAN_NAME" != *.mp4 ]] && [[ "$CLEAN_NAME" != *.webm ]]; then
                    FN="${CLEAN_NAME}.mkv"
                else
                    FN="$CLEAN_NAME"
                fi
            else
                FN="${CUSTOM}.mkv"
            fi
            
            if [[ "$URL" == *.m3u8* ]] || [[ "$URL" == *m3u8* ]]; then
                echo "📥 Downloading HLS Stream (yt-dlp + aria2c backend): $URL"
                yt-dlp \
                    --downloader aria2c \
                    --downloader-args "aria2c:-x 16 -s 16 -k 1M --console-log-level=warn --summary-interval=10" \
                    --user-agent "Mozilla/5.0" \
                    --merge-output-format mkv \
                    -o "source.mkv" \
                    "$URL"
            else
                echo "📥 Downloading Direct Link: $URL"
                aria2c -x 16 -s 16 -k 1M --user-agent="Mozilla/5.0" --console-log-level=warn --summary-interval=10 -o "source.mkv" "$URL"
            fi
            echo "$FN" > tg_fname.txt
          fi

      - name: 🏷 Extract Filename
        id: get_name
        run: echo "NAME=$(cat tg_fname.txt)" >> $GITHUB_OUTPUT

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: payload-${{ github.run_id }}
          path: |
            source.mkv
            tg_fname.txt
          retention-days: 1
          compression-level: 0

  # PHASE 2: PARALLEL ENCODER
  encode_phase:
    needs: download_phase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 🛠 Install Encoding Tools
        run: |
          sudo apt-get update && sudo apt-get install -y mkvtoolnix curl
          pip install -r requirements.txt

      - name: 📦 Cache FFmpeg Binary
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/ff*
          key: ffmpeg-master-linux64-gpl-${{ runner.os }}

      - name: ⬇️ Download FFmpeg (if not cached)
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
          sudo cp ffmpeg-master-latest-linux64-gpl/bin/ff* /usr/local/bin/
          rm -rf ffmpeg-master-latest-linux64-gpl*

      - name: 📥 Fetch Payload
        uses: actions/download-artifact@v4
        with:
          name: payload-${{ github.run_id }}

      - name: 📁 Setup Session Dir
        run: mkdir -p tg_session_dir

      - name: 🔀 Resolve Lane
        id: lane
        run: |
          LAST=$(( ${{ github.run_number }} % 10 ))
          if [[ "$LAST" == "0" || "$LAST" == "3" || "$LAST" == "6" || "$LAST" == "9" ]]; then
            echo "name=lane-A" >> $GITHUB_OUTPUT
          elif [[ "$LAST" == "1" || "$LAST" == "4" || "$LAST" == "7" ]]; then
            echo "name=lane-B" >> $GITHUB_OUTPUT
          else
            echo "name=lane-C" >> $GITHUB_OUTPUT
          fi

      - name: 💾 Restore Session Cache
        uses: actions/cache/restore@v4
        with:
          path: tg_session_dir
          key: tg-session-${{ steps.lane.outputs.name }}-${{ github.run_id }}
          restore-keys: |
            tg-session-${{ steps.lane.outputs.name }}-
            tg-session-

      - name: 🔑 Authorize Bot Session
        run: |
          LANE="${{ steps.lane.outputs.name }}"
          echo "🔀 Lane: $LANE"
          # Try lane-specific session first, then legacy fallbacks
          for SESSION_FILE in \
            "tg_session_dir/enc_session_${LANE}.session" \
            "tg_session_dir/tg_dl_session_${LANE}.session" \
            "tg_session_dir/enc_session.session" \
            "tg_session_dir/tg_dl_session.session"; do
            if [ -f "$SESSION_FILE" ]; then
              cp "$SESSION_FILE" ./enc_session.session
              echo "✅ Session restored: $SESSION_FILE"
              break
            fi
          done

      - name: Collect Workflow Telemetry
        uses: catchpoint/workflow-telemetry-action@v2
        with:
          theme: dark
          job_summary: true

      - name: 🚀 Start Parallel Encoder
        env:
          API_ID: ${{ secrets.TG_API_ID }}
          API_HASH: ${{ secrets.TG_API_HASH }}
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_KV_TOKEN: ${{ secrets.CF_KV_TOKEN }}
          SESSION_NAME: "enc_session"
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          USER_RES: ${{ github.event.inputs.res_choice }}
          USER_CRF: ${{ github.event.inputs.custom_crf }}
          USER_PRESET: ${{ github.event.inputs.custom_preset }}
          USER_GRAIN: ${{ github.event.inputs.film_grain }}
          AUDIO_MODE: ${{ github.event.inputs.audio_mode }}
          AUDIO_BITRATE: ${{ github.event.inputs.audio_bitrate }}
          RUN_VMAF: ${{ github.event.inputs.run_vmaf }}
          ANIME_NAME: ${{ github.event.inputs.anime_name }}
          SEASON: ${{ github.event.inputs.season }}
          EPISODE: ${{ github.event.inputs.episode }}
          AUDIO_TYPE: ${{ github.event.inputs.audio_type }}
          CONTENT_TYPE: ${{ github.event.inputs.content_type }}
          SUB_TRACKS: ${{ github.event.inputs.sub_tracks }}
          AUDIO_TRACKS: ${{ github.event.inputs.audio_tracks }}
          FILE_NAME: ${{ needs.download_phase.outputs.final_name }}
        run: python3 main.py

      - name: 💾 Save Bot Session
        if: always()
        run: |
          LANE="${{ steps.lane.outputs.name }}"
          if [ -f "enc_session.session" ]; then
            cp enc_session.session "tg_session_dir/enc_session_${LANE}.session"
            echo "✅ Bot session saved: enc_session_${LANE}.session"
          fi

      # Use a run_id-scoped key so parallel jobs on the same lane never overwrite
      # each other's cache. The Restore step uses `restore-keys` to still pick up
      # the latest entry from any prior run on this lane.
      - name: 🗃 Cache Bot Session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: tg_session_dir
          key: tg-session-${{ steps.lane.outputs.name }}-${{ github.run_id }}

      - name: 🗑 Delete Payload Artifact
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: `payload-${context.runId}`,
            });
            for (const artifact of artifacts.data.artifacts) {
              console.log(`Deleting artifact: ${artifact.name} (${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
